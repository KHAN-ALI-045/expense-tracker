<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudTrack - Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- --- ADDED: CHART.JS LIBRARY --- -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- ----------------------------- -->
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#paint0_linear)"/>
            <path d="M2 17L12 22L22 17M2 12L12 17L22 12" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="12" gradientUnits="userSpaceOnUse">
                <stop stop-color="#4F46E5"/>
                <stop offset="1" stop-color="#EC4899"/>
              </linearGradient>
              <linearGradient id="paint1_linear" x1="2" y1="12" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#4F46E5"/>
                <stop offset="1" stop-color="#EC4899"/>
              </linearGradient>
            </defs>
          </svg>
          <h1>CloudTrack</h1>
        </div>
        <div class="user-profile">
          <button id="btn-login" class="btn-primary" style="display: none; margin-right: 10px;">Log In</button>
          <button id="btn-logout" class="btn-primary" style="display: none; margin-right: 10px; background-color: var(--negative);">Log Out</button>
          <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=random" alt="User Profile" class="avatar" style="display: none;" />
        </div>
      </header>

      <main class="dashboard">
        <div class="summary-cards">
          <div class="card glass">
            <h3>Total Balance</h3>
            <p class="amount" id="total-balance">₹0.00</p>
          </div>
          <div class="card glass income">
            <h3>Income</h3>
            <p class="amount positive" id="total-income">+₹0.00</p>
          </div>
          <div class="card glass expense">
            <h3>Expenses</h3>
            <p class="amount negative" id="total-expense">-₹0.00</p>
          </div>
        </div>

        <!-- --- ADDED: VISUAL ANALYTICS SECTION --- -->
        <div class="chart-section glass" style="margin-bottom: 2rem; padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
          <h2 style="font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">Spending Overview</h2>
          <div style="max-width: 280px; width: 100%;">
            <canvas id="expense-chart"></canvas>
          </div>
        </div>
        <!-- -------------------------------------- -->

        <div class="main-content">
          <div class="transactions-section glass">
            <div class="section-header">
              <h2>Recent Transactions</h2>
              <button class="btn-primary" id="add-transaction-btn">+ New</button>
            </div>

            <div style="margin-bottom: 20px;">
              <input type="text" id="search-input" placeholder="Search by description..." 
                     style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; outline: none; transition: 0.3s;">
            </div>

            <ul class="transaction-list" id="transaction-list">
              <div class="empty-state">No transactions yet. Add one!</div>
            </ul>
          </div>

          <div class="add-transaction-section glass" id="add-transaction-form-container" style="display: none;">
            <h2>Add Transaction</h2>
            <form id="transaction-form">
              <div class="form-group">
                <label for="text">Description</label>
                <input type="text" id="text" placeholder="e.g. AWS Hosting Bill" required />
              </div>
              <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" placeholder="Enter amount..." required />
                <small>Use negative numbers for expenses, positive for income.</small>
              </div>
              <div class="form-group">
                <label for="receipt">Receipt (Optional Image)</label>
                <input type="file" id="receipt" accept="image/*" />
                <small>Upload receipt to Cloudinary (Storage as a Service).</small>
              </div>
              <button class="btn-primary full-width">Add transaction</button>
            </form>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
